<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #1a1a1a, #000);
    font-family: 'Arial', sans-serif;
}

/* TEXTO */
h1 {
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    font-size: 2.8em;
    color: #ffd54f;
    text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff9900;
}

/* GIRASOL */
.flower {
    position: absolute;
    bottom: 0;
    width: 120px;
    height: 120px;
}

.center {
    position: absolute;
    width: 50px;
    height: 50px;
    background: #4b2e05;
    border-radius: 50%;
    top: 35px;
    left: 35px;
    z-index: 2;
}

.petal {
    position: absolute;
    width: 40px;
    height: 80px;
    background: orange;
    border-radius: 50%;
    transform-origin: center bottom;
    left: 40px;
    top: 0;
}

/* TALLO */
.stem {
    position: absolute;
    width: 6px;
    height: 120px;
    background: #3cb371;
    left: 57px;
    top: 100px;
    border-radius: 3px;
}

/* HOJAS */
.leaf {
    position: absolute;
    width: 40px;
    height: 20px;
    background: #2e8b57;
    border-radius: 20px;
}

.leaf.left {
    top: 150px;
    left: 20px;
    transform: rotate(-30deg);
}

.leaf.right {
    top: 170px;
    left: 60px;
    transform: rotate(30deg);
}

/* BRILLITOS */
.sparkle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: gold;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-10px);
        opacity: 1;
    }
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>

</head>

<body>

<h1>🌼 Para Nathan, Tus flores amarillas 🌼</h1>

<script>
/* CREAR GIRASOL */
function createFlower(x) {
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.style.left = x + 'px';

    // pétalos
    for (let i = 0; i < 12; i++) {
        let petal = document.createElement('div');
        petal.className = 'petal';
        petal.style.transform = `rotate(${i * 30}deg)`;
        flower.appendChild(petal);
    }

    // centro
    let center = document.createElement('div');
    center.className = 'center';
    flower.appendChild(center);

    // tallo
    let stem = document.createElement('div');
    stem.className = 'stem';
    flower.appendChild(stem);

    // hojas
    let leaf1 = document.createElement('div');
    leaf1.className = 'leaf left';

    let leaf2 = document.createElement('div');
    leaf2.className = 'leaf right';

    flower.appendChild(leaf1);
    flower.appendChild(leaf2);

    document.body.appendChild(flower);
}

/* CREAR VARIAS FLORES */
for (let i = 0; i < 5; i++) {
    createFlower(100 + i * 120);
}

/* BRILLITOS */
function createSparkle() {
    const s = document.createElement('div');
    s.className = 'sparkle';

    s.style.left = Math.random() * window.innerWidth + 'px';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';

    document.body.appendChild(s);

    setTimeout(() => s.remove(), 5000);
}

setInterval(createSparkle, 100);
</script>

</body>
</html>
