<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores Amarillas</title>

<style>
body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* TEXTO */
h1 {
    position: absolute;
    top: 8%;
    width: 100%;
    text-align: center;
    font-size: 2em;
    color: #ffd54f;
    text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff9900;
}

/* RAMO */
.bouquet {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
}

/* GIRASOL GRANDE */
.flower {
    position: relative;
    width: 140px;
    height: 140px;
    margin: -35px;
}

/* CENTRO */
.center {
    position: absolute;
    width: 60px;
    height: 60px;
    background: #4b2e05;
    border-radius: 50%;
    top: 40px;
    left: 40px;
    z-index: 2;
}

/* PÉTALOS */
.petal {
    position: absolute;
    width: 50px;
    height: 100px;
    background: orange;
    border-radius: 50%;
    left: 45px;
    top: 0;
    transform-origin: center bottom;
    box-shadow: 0 0 15px rgba(255,200,0,0.8);
}

/* TALLO */
.stem {
    position: absolute;
    width: 6px;
    height: 120px;
    background: #3cb371;
    left: 67px;
    top: 120px;
}

/* HOJAS */
.leaf {
    position: absolute;
    width: 40px;
    height: 20px;
    background: #2e8b57;
    border-radius: 20px;
}

.leaf.left {
    top: 160px;
    left: 20px;
    transform: rotate(-30deg);
}

.leaf.right {
    top: 180px;
    left: 70px;
    transform: rotate(30deg);
}

/* LISTÓN */
.ribbon {
    position: absolute;
    bottom: 40px;
    width: 140px;
    height: 40px;
    background: crimson;
    border-radius: 20px;
    box-shadow: 0 0 15px rgba(255,0,0,0.6);
}

/* BRILLOS */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: gold;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-10px);
        opacity: 1;
    }
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌻 Para Nathan, Tus flores amarillas 🌻</h1>

<div class="bouquet" id="bouquet"></div>

<script>
function createFlower() {
    const flower = document.createElement('div');
    flower.className = 'flower';

    for (let i = 0; i < 12; i++) {
        let petal = document.createElement('div');
        petal.className = 'petal';
        petal.style.transform = `rotate(${i * 30}deg)`;
        flower.appendChild(petal);
    }

    let center = document.createElement('div');
    center.className = 'center';
    flower.appendChild(center);

    let stem = document.createElement('div');
    stem.className = 'stem';
    flower.appendChild(stem);

    let leaf1 = document.createElement('div');
    leaf1.className = 'leaf left';

    let leaf2 = document.createElement('div');
    leaf2.className = 'leaf right';

    flower.appendChild(leaf1);
    flower.appendChild(leaf2);

    return flower;
}

const bouquet = document.getElementById("bouquet");

/* CREAR RAMO GRANDE */
for (let i = 0; i < 5; i++) {
    bouquet.appendChild(createFlower());
}

/* LISTÓN */
const ribbon = document.createElement("div");
ribbon.className = "ribbon";
bouquet.appendChild(ribbon);

/* BRILLOS */
function sparkle() {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * window.innerWidth + 'px';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 5000);
}

setInterval(sparkle, 120);
</script>

</body>
</html>
