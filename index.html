<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(#87CEEB, #fdf6e3);
        overflow: hidden;
        font-family: 'Arial', sans-serif;
        text-align: center;
    }

    h1 {
        position: absolute;
        top: 20px;
        width: 100%;
        color: #333;
        font-size: 2em;
    }

    .flower {
        position: absolute;
        bottom: -100px;
        width: 50px;
        height: 50px;
        background: yellow;
        border-radius: 50%;
        animation: floatUp 8s linear infinite;
    }

    .flower::before {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        background: orange;
        border-radius: 50%;
        top: 15px;
        left: 15px;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(0) rotate(0deg);
            opacity: 1;
        }
        100% {
            transform: translateY(-110vh) rotate(360deg);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<h1>🌼 Para Nathan, Tus flores amarillas 🌼</h1>

<script>
function createFlower() {
    const flower = document.createElement('div');
    flower.classList.add('flower');

    flower.style.left = Math.random() * window.innerWidth + 'px';
    flower.style.animationDuration = (5 + Math.random() * 5) + 's';

    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 8000);
}

setInterval(createFlower, 300);
</script>

</body>
</html>
